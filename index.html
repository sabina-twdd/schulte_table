<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>舒爾特方格 · 同題對戰</title>

  <!-- Sabina · 舒爾特方格 favicon（檔案放在 icons/ 資料夾，相對路徑適用 GitHub Pages 專案頁） -->
  <link rel="icon" href="icons/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="icons/site.webmanifest">
  <meta name="theme-color" content="#FF7A9C">

  <!-- 樣式表（同一資料夾） -->
  <link rel="stylesheet" href="style.css" />

  <!-- 邏輯（defer：等 HTML 解析完再執行，確保抓得到下面的元素） -->
  <script src="script.js" defer></script>

  <!-- Firebase 整合層（ES module，會非同步載入 SDK 後掛上 window.LB） -->
  <script type="module" src="firebase.js"></script>
</head>
<body>

  <div class="wrap">

    <!-- 標題列：左邊標題，右邊「Google 登入 + 深淺色切換」兩顆圓鈕並排 -->
    <header>
      <div class="header-text">
        <div class="eyebrow">專注度訓練 · 多人同題對戰</div>
        <h1 id="titleTap">舒爾特方格</h1>
      </div>

      <div class="topbar">
        <!-- 玩法：點問號展開說明浮層 -->
        <div class="help" id="helpWrap">
          <button class="help-btn" id="helpBtn" title="玩法" aria-label="玩法">?</button>
          <div class="help-menu" id="helpMenu">
            <p class="help-title">玩法</p>
            <ul class="help-list">
              <li>依序點擊 1 → n 的數字，全部點完即完成</li>
              <li>計時越短越好，點錯會有提示</li>
              <li>提醒模式：點過的數字會變色（關掉更難）</li>
              <li>同題對戰：產生挑戰連結傳給朋友，大家玩一模一樣的方格比快</li>
            </ul>
          </div>
        </div>
        <!-- 帳號：登入後成績才能上玩家排行榜（全站常駐顯示） -->
        <div class="account" id="accountBar">
          <!-- 未登入：只放 Google 圖示的圓鈕 -->
          <button class="acct-login" id="loginBtn" title="使用 Google 登入" aria-label="使用 Google 登入">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="#4285F4" d="M23.5 12.3c0-.8-.1-1.6-.2-2.3H12v4.5h6.5a5.6 5.6 0 0 1-2.4 3.7v3h3.9c2.3-2.1 3.5-5.2 3.5-8.9z"/>
              <path fill="#34A853" d="M12 24c3.2 0 6-1.1 8-2.9l-3.9-3c-1.1.7-2.5 1.2-4.1 1.2-3.1 0-5.8-2.1-6.7-5H1.3v3.1A12 12 0 0 0 12 24z"/>
              <path fill="#FBBC05" d="M5.3 14.3a7.2 7.2 0 0 1 0-4.6V6.6H1.3a12 12 0 0 0 0 10.8l4-3.1z"/>
              <path fill="#EA4335" d="M12 4.8c1.8 0 3.3.6 4.6 1.8l3.4-3.4A12 12 0 0 0 12 0 12 12 0 0 0 1.3 6.6l4 3.1c.9-2.9 3.6-5 6.7-5z"/>
            </svg>
          </button>
          <!-- 登入後：只顯示圓頭像；點頭像展開名字 + 登出 -->
          <div class="acct-user hidden" id="acctUser">
            <button class="acct-avatar" id="acctPhotoBtn" title="帳號選單" aria-label="帳號選單">
              <img class="acct-photo" id="acctPhoto" alt="" referrerpolicy="no-referrer" />
              <span class="acct-initial hidden" id="acctInitial"></span>
            </button>
            <div class="acct-menu" id="acctMenu">
              <span class="acct-name" id="acctName"></span>
              <button class="acct-logout" id="logoutBtn">登出</button>
            </div>
          </div>
        </div>
        <!-- 深/淺色切換鈕。內部兩個 icon 由 JS 依主題切換顯示 -->
        <button class="theme-btn" id="themeBtn" title="切換主題">
          <!-- 月亮（深色時顯示，代表目前深色） -->
          <svg id="iconMoon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <!-- 太陽（淺色時顯示） -->
          <svg id="iconSun" class="hidden" viewBox="0 0 24 24" width="18" height="18"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- =====================================================
         畫面切換：四個 <section>，同時只顯示一個
         （JS 用 .hidden 控制；預設顯示 setup）
         ===================================================== -->

    <!-- ---------- 設定畫面 ---------- -->
    <section id="screen-setup">
      <!-- 挑戰橫幅：只有從別人連結進來時才顯示 -->
      <div class="banner hidden" id="challengeBanner">
        <div class="b-ico">🎯</div>
        <div class="b-text" id="challengeText"></div>
      </div>

      <div class="card">
        <!-- 難度：4 顆鈕，data-size 給 JS 讀 -->
        <div class="row">
          <p class="field-label">方格大小</p>
          <div class="chips" id="sizeChips">
            <button class="chip on" data-size="5">5×5<span class="lbl">入門</span></button>
            <button class="chip"    data-size="6">6×6<span class="lbl">進階</span></button>
            <button class="chip"    data-size="7">7×7<span class="lbl">困難</span></button>
            <button class="chip"    data-size="8">8×8<span class="lbl">魔王</span></button>
          </div>
          <!-- 隱藏關卡：連點五下標題才會取代上面那排（純本機，不上排行榜） -->
          <div class="chips secret hidden" id="sizeChipsMini">
            <button class="chip" data-size="1">1×1<span class="lbl">秒殺</span></button>
            <button class="chip" data-size="2">2×2<span class="lbl">熱身</span></button>
            <button class="chip" data-size="3">3×3<span class="lbl">輕鬆</span></button>
            <button class="chip" data-size="4">4×4<span class="lbl">小試</span></button>
          </div>
        </div>

        <!-- 提醒模式開關 -->
        <div class="row">
          <p class="field-label">提醒模式</p>
          <div class="toggle on" id="hintToggle">
            <div class="t-text">標記已經點過的數字
              <small>關掉更難 — 點過的數字不會變色</small>
            </div>
            <div class="switch"></div>
          </div>
        </div>

        <!-- 主要按鈕 -->
        <div class="btn-stack" style="margin-top:20px;">
          <button class="btn btn-primary" id="startBtn">開始</button>
          <button class="btn btn-ghost" id="makeLinkBtn">產生挑戰連結</button>
          <button class="btn btn-ghost" id="leaderboardBtn">玩家排行榜</button>
        </div>

        <!-- 產生的連結（預設隱藏，按「產生挑戰連結」後顯示） -->
        <div class="linkbox hidden" id="linkbox">
          <div class="lk-cap">把這條連結傳給朋友</div>
          <div class="lk-url" id="linkUrl"></div>
          <button class="copybtn" id="copyBtn">複製連結</button>
        </div>

        <!-- 個人最佳摘要（由 JS 填入 #pbGrid） -->
        <div class="stats-summary">
          <p class="field-label" style="margin-top:16px;">個人最佳（秒）</p>
          <div class="pb-grid" id="pbGrid"></div>
          <div class="link-row hidden" id="viewStatsRow">
            <button class="textlink" id="viewStatsBtn">查看完整戰績 →</button>
          </div>
        </div>
      </div>

      <!-- 挑戰模式時，提供「開自己的新挑戰」入口 -->
      <div class="card hidden" id="newChallengeCard" style="margin-top:12px;text-align:center;">
        <button class="btn btn-ghost" id="newChallengeBtn">建立我自己的新挑戰</button>
      </div>
    </section>

    <!-- ---------- 戰績畫面 ---------- -->
    <section id="screen-stats" class="hidden">
      <p class="field-label">個人最佳（秒）</p>
      <div class="pb-grid" id="pbGridStats" style="margin-bottom:16px;"></div>
      <p class="field-label">最近紀錄</p>
      <div class="card" id="histCard"></div>
      <div class="btn-stack" style="margin-top:16px;">
        <button class="btn btn-ghost" id="statsBackBtn">← 回首頁</button>
        <button class="textlink hidden" id="clearStatsBtn" style="margin-top:4px;">清除所有戰績</button>
      </div>
    </section>

    <!-- ---------- 排行榜畫面 ---------- -->
    <section id="screen-leaderboard" class="hidden">
      <p class="field-label">玩家排行榜 · 各難度最快紀錄</p>
      <div class="card">
        <!-- 難度切換 -->
        <div class="chips" id="lbSizeChips" style="margin-bottom:10px;">
          <button class="chip on" data-size="5">5×5</button>
          <button class="chip"    data-size="6">6×6</button>
          <button class="chip"    data-size="7">7×7</button>
          <button class="chip"    data-size="8">8×8</button>
        </div>
        <!-- 提醒開/關切換 -->
        <div class="lb-htabs" id="lbHintTabs">
          <button class="lb-htab on" data-hint="1">提醒開</button>
          <button class="lb-htab"    data-hint="0">提醒關</button>
        </div>
        <!-- 榜單（由 JS 填入） -->
        <div class="lb-list" id="lbList"></div>
      </div>
      <div class="btn-stack" style="margin-top:16px;">
        <button class="btn btn-ghost" id="lbBackBtn">← 回首頁</button>
      </div>
    </section>

    <!-- ---------- 遊戲畫面 ---------- -->
    <section id="screen-game" class="hidden">
      <div class="game-top">
        <div class="timer"><span id="timerVal">0.00</span><span class="unit">秒</span></div>
        <div class="target">
          <div class="t-cap">下一個</div>
          <div class="t-num" id="targetNum">1</div>
        </div>
      </div>
      <div class="meta-strip">
        <span id="metaInfo"></span>
        <span id="metaCode"></span>
      </div>
      <div class="progress"><i id="progBar"></i></div>
      <!-- 方格由 JS 動態產生填入 #board -->
      <div class="board" id="board"></div>
      <button class="abort" id="abortBtn">放棄這局</button>
    </section>

    <!-- ---------- 結算畫面 ---------- -->
    <section id="screen-result" class="hidden">
      <div class="card result">
        <div class="cap" id="resCap">完成</div>
        <div class="big-time"><span id="resTime">0.00</span><span class="unit">秒</span></div>
        <div class="rmeta" id="resMeta"></div>
        <!-- 排行榜上傳狀態（登入才會上傳） -->
        <div class="lb-note" id="resLbNote"></div>
        <div class="result-actions btn-stack">
          <button class="btn btn-primary" id="againBtn">再玩一次</button>
          <button class="btn btn-ghost" id="shareBtn">分享成績</button>
          <button class="btn btn-ghost" id="resultBackBtn">回首頁</button>
        </div>
        <!-- 成績圖預覽（桌機／不支援檔案分享時顯示，可下載） -->
        <div class="sharebox hidden" id="resShareBox">
          <div class="lk-cap">成績圖 — 存下來分享</div>
          <img id="resShareImg" alt="成績圖片" />
          <button class="copybtn" id="resDownBtn">下載圖片</button>
        </div>

        <!-- 結算頁的連結框（按「產生/複製挑戰連結」後顯示） -->
        <div class="linkbox hidden" id="resLinkbox">
          <div class="lk-cap">複製這段成績分享給朋友</div>
          <div class="lk-url" id="resLinkUrl"></div>
          <button class="copybtn" id="resCopyBtn">複製成績</button>
        </div>
      </div>
    </section>

    <footer>
      同一題排除了最大的運氣（排列），比起來公平得多。<br>
    </footer>
  </div>
</body>
</html>
